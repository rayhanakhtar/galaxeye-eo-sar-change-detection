# EO-SAR Binary Change Detection Configuration

# Data Configuration
data:
  dataset_path: "dataset"
  image_size: 256  # Resize from 1024x1024
  train_split: "train"
  val_split: "val"
  test_split: "test"
  
# Model Configuration
model:
  name: "SiameseUNet"
  backbone: "resnet34"
  pretrained: true
  num_classes: 2
  # EO = 3 channels, SAR = 1 channel
  eo_channels: 3
  sar_channels: 1

# Training Configuration
training:
  batch_size: 16
  num_epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.0001
  optimizer: "adamw"
  
  # Scheduler
  scheduler: "cosine"
  warmup_epochs: 5
  
  # Early Stopping
  early_stopping:
    patience: 10
    min_delta: 0.001
  
  # Loss Function (handle class imbalance)
  loss:
    type: "focal_dice"
    focal_weight: 0.5
    dice_weight: 0.5
    focal_gamma: 2.0

# Augmentation
augmentation:
  train:
    random_flip: true
    random_rotate: true
    rotate_degrees: 15
    color_jitter: true
    brightness: 0.2
    contrast: 0.2
  val:
    enabled: false

# Normalization
normalization:
  # ImageNet stats for EO (RGB)
  eo_mean: [0.485, 0.456, 0.406]
  eo_std: [0.229, 0.224, 0.225]
  # SAR-specific stats (approximated)
  sar_mean: [0.5]
  sar_std: [0.25]

# Evaluation
evaluation:
  metrics:
    - "iou"
    - "precision"
    - "recall"
    - "f1"
  save_visualizations: true
  num_vis_samples: 10

# Checkpointing
checkpoint:
  save_dir: "checkpoints"
  save_best: true
  monitor: "val_iou"
  mode: "max"

# Random Seed
seed: 42

# Device
device: "cuda"  # or "cpu"