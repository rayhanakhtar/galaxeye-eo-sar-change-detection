data:
  dataset_path: dataset
  image_size: 256
  train_split: train
  val_split: val
  test_split: test
model:
  name: DualEncoderEOSARUNet
  backbone: resnet34
  pretrained: true
  num_classes: 2
  eo_channels: 3
  sar_channels: 1
training:
  batch_size: 2
  num_epochs: 1
  num_workers: 0
  amp: false
  learning_rate: 0.0001
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 5
  early_stopping:
    patience: 10
    min_delta: 0.001
  loss:
    type: focal_dice
    focal_weight: 0.5
    dice_weight: 0.5
    focal_gamma: 2.0
  debug_samples: 4
augmentation:
  train:
    random_flip: true
    random_rotate: true
    rotate_degrees: 15
    color_jitter: true
    brightness: 0.2
    contrast: 0.2
  val:
    enabled: false
normalization:
  eo_mean:
  - 0.485
  - 0.456
  - 0.406
  eo_std:
  - 0.229
  - 0.224
  - 0.225
  sar_mean:
  - 0.5
  sar_std:
  - 0.25
evaluation:
  metrics:
  - iou
  - precision
  - recall
  - f1
  save_visualizations: true
  num_vis_samples: 10
checkpoint:
  save_dir: checkpoints_debug
  save_best: true
  monitor: val_iou
  mode: max
seed: 42
device: cuda
